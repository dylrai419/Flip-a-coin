<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Flip — Betting Game</title>
<style>
/* ── Reset & base ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold-bright:  #FFD700;
  --gold-mid:     #C8960C;
  --gold-dark:    #7A5800;
  --silver-bright:#E8E8F0;
  --silver-mid:   #A0A0B8;
  --silver-dark:  #505068;
  --bg-top:       #0f0c1a;
  --bg-bot:       #050308;
  --card-bg:      rgba(255,255,255,0.05);
  --card-border:  rgba(255,255,255,0.10);
  --green:        #22c55e;
  --red:          #ef4444;
  --text:         #f0eeff;
  --muted:        rgba(240,238,255,0.45);
}

html, body {
  min-height: 100%;
  background: radial-gradient(ellipse at 20% 0%, #1e1040 0%, var(--bg-top) 45%, var(--bg-bot) 100%);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow-x: hidden;
}

/* ── Layout ───────────────────────────────────────────── */
.page {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  grid-template-columns: 1fr;
  place-items: center;
  padding: 24px 16px 32px;
  gap: 0;
}

header {
  text-align: center;
  padding-bottom: 8px;
}

header h1 {
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  font-weight: 900;
  letter-spacing: .06em;
  background: linear-gradient(100deg, var(--gold-bright) 0%, #ffaa40 50%, var(--silver-bright) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

header p {
  color: var(--muted);
  font-size: .82rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-top: 2px;
}

main {
  width: 100%;
  max-width: 540px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
}

/* ── Balance bar ──────────────────────────────────────── */
.balance-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  padding: 14px 22px;
  backdrop-filter: blur(12px);
}

.bal-block { text-align: center; }

.bal-label {
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 3px;
}

.bal-value {
  font-size: 1.55rem;
  font-weight: 800;
  line-height: 1;
}

#balanceVal   { color: var(--gold-bright); text-shadow: 0 0 16px rgba(255,215,0,.4); }
#winsVal      { color: var(--green); }
#lossesVal    { color: var(--red); }
#streakVal    { color: #a78bfa; }

/* ── Coin stage ───────────────────────────────────────── */
.coin-stage {
  perspective: 900px;
  width: 190px;
  height: 190px;
  cursor: pointer;
  flex-shrink: 0;
}

.coin {
  width: 190px;
  height: 190px;
  position: relative;
  transform-style: preserve-3d;   /* children live in shared 3D space */
  transition: filter .3s;
  filter: drop-shadow(0 12px 36px rgba(255,215,0,.30));
  will-change: transform;
}

.coin-stage:hover .coin:not(.is-flipping) {
  filter: drop-shadow(0 14px 44px rgba(255,215,0,.50));
}

/* ── Shared face base ──────────────────────────────────── */
.coin-heads,
.coin-tails {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

/* HEADS — gold, front face, no rotateY */
.coin-heads {
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  background:
    radial-gradient(circle at 38% 34%, rgba(255,255,255,.45) 0%, transparent 42%),
    radial-gradient(circle at 50% 50%, #FFE84D 0%, #FFD000 28%, #E8A000 55%, #B86800 78%, #7A4200 100%);
  box-shadow:
    inset 0 2px 6px rgba(255,255,255,0.6),
    inset 0 -3px 8px rgba(0,0,0,0.35),
    0 0 0 6px #a07000,
    0 0 0 8px #7a5000;
}

.coin-heads .symbol { font-size: 5rem; line-height: 1; filter: drop-shadow(0 3px 8px rgba(0,0,0,.55)); }

/* TAILS — silver, back face, rotateY(180deg) */
.coin-tails {
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  transform: rotateY(180deg);
  background: radial-gradient(circle at 35% 35%, #F0F0F0, #B8B8B8, #707070);
  box-shadow:
    inset 0 2px 6px rgba(255,255,255,0.6),
    inset 0 -3px 8px rgba(0,0,0,0.35),
    0 0 0 6px #888,
    0 0 0 8px #666;
}

.coin-tails .symbol { font-size: 5rem; line-height: 1; filter: drop-shadow(0 3px 8px rgba(0,0,0,.55)); }
.coin-tails .label  { font-size: .62rem; font-weight: 800; letter-spacing: .22em; color: #333; text-transform: uppercase; }

/* ── Flip keyframes ───────────────────────────────────── */
/* Land on HEADS  = end at 0° / 360° (front face visible) */
/* Land on TAILS  = end at 180° (back face visible)       */

@keyframes flipToHeads {
  0%   { transform: rotateY(0deg)    translateY(0);     }
  18%  { transform: rotateY(300deg)  translateY(-90px); }
  50%  { transform: rotateY(810deg)  translateY(-130px);}
  78%  { transform: rotateY(1260deg) translateY(-30px); }
  90%  { transform: rotateY(1420deg) translateY(5px);   }
  100% { transform: rotateY(1440deg) translateY(0);     }
}

@keyframes flipToTails {
  0%   { transform: rotateY(0deg)    translateY(0);     }
  18%  { transform: rotateY(300deg)  translateY(-90px); }
  50%  { transform: rotateY(810deg)  translateY(-130px);}
  78%  { transform: rotateY(1260deg) translateY(-30px); }
  90%  { transform: rotateY(1420deg) translateY(5px);   }
  100% { transform: rotateY(1620deg) translateY(0);     } /* +180° extra → tails */
}

.coin.flip-heads { animation: flipToHeads 1.1s cubic-bezier(.4,0,.2,1) forwards; }
.coin.flip-tails { animation: flipToTails 1.1s cubic-bezier(.4,0,.2,1) forwards; }

/* ── Result badge ─────────────────────────────────────── */
.result-badge {
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#resultMsg {
  font-size: 1.45rem;
  font-weight: 800;
  letter-spacing: .06em;
  opacity: 0;
  transform: scale(.85) translateY(8px);
  transition: opacity .35s, transform .35s;
  text-align: center;
}

#resultMsg.show { opacity: 1; transform: scale(1) translateY(0); }
#resultMsg.win  { color: var(--green); text-shadow: 0 0 20px rgba(34,197,94,.6); }
#resultMsg.lose { color: var(--red);   text-shadow: 0 0 20px rgba(239,68,68,.6); }

/* ── Bet panel ────────────────────────────────────────── */
.bet-panel {
  width: 100%;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 20px 22px;
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Side choice */
.side-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.side-btn {
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 10px 0;
  font-size: .82rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  background: rgba(255,255,255,.04);
  color: var(--muted);
}

.side-btn .icon { font-size: 1.1rem; }

.side-btn.active-heads {
  background: rgba(255,215,0,.12);
  border-color: var(--gold-bright);
  color: var(--gold-bright);
  box-shadow: 0 0 18px rgba(255,215,0,.18);
}

.side-btn.active-tails {
  background: rgba(200,200,220,.12);
  border-color: var(--silver-bright);
  color: var(--silver-bright);
  box-shadow: 0 0 18px rgba(200,200,220,.18);
}

/* Bet amount row */
.bet-label-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.bet-label-row span:first-child {
  font-size: .68rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
}

#betDisplay {
  font-size: 1.05rem;
  font-weight: 800;
  color: var(--gold-bright);
}

/* Slider */
input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 5px;
  border-radius: 4px;
  background: linear-gradient(to right, var(--gold-bright) 0%, var(--gold-bright) var(--pct,0%), rgba(255,255,255,.15) var(--pct,0%), rgba(255,255,255,.15) 100%);
  outline: none;
  cursor: pointer;
  transition: background .05s;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffe566, var(--gold-mid));
  border: 2px solid #a07000;
  box-shadow: 0 2px 8px rgba(0,0,0,.5);
  cursor: grab;
  transition: transform .15s;
}

input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); cursor: grabbing; }

input[type=range]::-moz-range-thumb {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffe566, var(--gold-mid));
  border: 2px solid #a07000;
  box-shadow: 0 2px 8px rgba(0,0,0,.5);
  cursor: grab;
}

/* Preset chips */
.presets {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.preset-btn {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 8px;
  padding: 7px 0;
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: .07em;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}

.preset-btn:hover {
  background: rgba(255,215,0,.12);
  border-color: rgba(255,215,0,.5);
  color: var(--gold-bright);
}

/* Flip button */
.flip-btn {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, var(--gold-bright) 0%, #ffaa30 50%, #ff8c00 100%);
  color: #3a1f00;
  font-size: 1.05rem;
  font-weight: 900;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 6px 28px rgba(255,165,0,.40), 0 2px 6px rgba(0,0,0,.4);
  transition: transform .15s, box-shadow .15s, filter .15s;
  position: relative;
  overflow: hidden;
}

.flip-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, rgba(255,255,255,.35) 0%, transparent 55%);
  border-radius: inherit;
}

.flip-btn:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(255,165,0,.55), 0 3px 10px rgba(0,0,0,.4);
}

.flip-btn:active:not(:disabled) { transform: translateY(0) scale(.98); }

.flip-btn:disabled {
  opacity: .55;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none;
}

/* ── History dots ─────────────────────────────────────── */
.history-section {
  width: 100%;
}

.history-header {
  font-size: .65rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  text-align: center;
}

.dots {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  justify-content: center;
  min-height: 34px;
}

.dot {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .6rem;
  font-weight: 800;
  letter-spacing: .04em;
  animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both;
  flex-shrink: 0;
}

@keyframes popIn {
  from { transform: scale(0) rotate(-45deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg);   opacity: 1; }
}

.dot.win-h  { background: rgba(255,215,0,.18);  border: 2px solid var(--gold-bright); color: var(--gold-bright); }
.dot.lose-h { background: rgba(255,100,0,.14);  border: 2px solid #ff6000; color: #ff9040; }
.dot.win-t  { background: rgba(190,190,220,.18);border: 2px solid var(--silver-bright); color: var(--silver-bright); }
.dot.lose-t { background: rgba(239,68,68,.14);  border: 2px solid var(--red); color: #f87171; }

/* ── Footer reset ─────────────────────────────────────── */
footer {
  padding-top: 8px;
}

.reset-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 50px;
  padding: 7px 22px;
  font-size: .72rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  transition: all .18s;
}

.reset-btn:hover {
  border-color: rgba(255,255,255,.35);
  color: var(--text);
  background: rgba(255,255,255,.06);
}

/* ── Bankrupt overlay ─────────────────────────────────── */
#bankruptModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.82);
  backdrop-filter: blur(8px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

#bankruptModal.show { display: flex; }

.modal-box {
  background: linear-gradient(160deg, #1e1040, #0f0c1a);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 24px;
  padding: 36px 40px;
  text-align: center;
  max-width: 340px;
  animation: modalPop .4s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes modalPop {
  from { transform: scale(.7); opacity: 0; }
  to   { transform: scale(1);  opacity: 1; }
}

.modal-box .emoji { font-size: 3.5rem; margin-bottom: 12px; }
.modal-box h2 { font-size: 1.6rem; font-weight: 900; color: var(--red); margin-bottom: 8px; }
.modal-box p  { color: var(--muted); font-size: .9rem; margin-bottom: 24px; }

.modal-box button {
  background: linear-gradient(135deg, var(--gold-bright), #ffaa30);
  border: none;
  border-radius: 50px;
  padding: 12px 36px;
  font-size: .95rem;
  font-weight: 800;
  letter-spacing: .08em;
  color: #3a1f00;
  cursor: pointer;
  transition: transform .15s;
}

.modal-box button:hover { transform: scale(1.05); }

/* ── Particles canvas ─────────────────────────────────── */
#particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
}

/* ── Login screen ─────────────────────────────────────── */
#loginScreen {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: radial-gradient(ellipse at 20% 0%, #1e1040 0%, #0f0c1a 45%, #050308 100%);
}

.login-card {
  width: 100%;
  max-width: 380px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.11);
  border-radius: 24px;
  padding: 40px 36px 36px;
  backdrop-filter: blur(18px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  box-shadow: 0 32px 80px rgba(0,0,0,.55);
}

.login-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.login-logo .coin-icon {
  font-size: 3.2rem;
  filter: drop-shadow(0 0 18px rgba(255,215,0,.55));
  animation: loginCoinSpin 6s linear infinite;
}

@keyframes loginCoinSpin {
  0%   { transform: rotateY(0deg);   }
  45%  { transform: rotateY(0deg);   }  /* pause on heads */
  50%  { transform: rotateY(90deg);  }
  55%  { transform: rotateY(180deg); }
  95%  { transform: rotateY(180deg); } /* pause on tails */
  100% { transform: rotateY(360deg); }
}

.login-logo h2 {
  font-size: 1.6rem;
  font-weight: 900;
  letter-spacing: .06em;
  background: linear-gradient(100deg, var(--gold-bright) 0%, #ffaa40 50%, var(--silver-bright) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.login-logo p {
  font-size: .75rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
}

.login-fields {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.login-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.login-field label {
  font-size: .67rem;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  padding-left: 2px;
}

.login-field input {
  width: 100%;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.13);
  border-radius: 12px;
  padding: 13px 16px;
  font-size: .97rem;
  color: var(--text);
  outline: none;
  transition: border-color .18s, box-shadow .18s, background .18s;
  font-family: inherit;
}

.login-field input::placeholder { color: rgba(255,255,255,.25); }

.login-field input:focus {
  border-color: var(--gold-bright);
  background: rgba(255,215,0,.07);
  box-shadow: 0 0 0 3px rgba(255,215,0,.15);
}

.login-field input.input-error {
  border-color: var(--red);
  background: rgba(239,68,68,.07);
  box-shadow: 0 0 0 3px rgba(239,68,68,.15);
}

.login-error {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(239,68,68,.12);
  border: 1px solid rgba(239,68,68,.35);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: .83rem;
  font-weight: 600;
  color: #f87171;
  opacity: 0;
  transform: translateY(-6px);
  transition: opacity .25s, transform .25s;
  pointer-events: none;
}

.login-error.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.login-error::before { content: '⚠'; font-size: 1rem; flex-shrink: 0; }

.login-submit {
  width: 100%;
  padding: 14px;
  border-radius: 13px;
  border: none;
  background: linear-gradient(135deg, var(--gold-bright) 0%, #ffaa30 50%, #ff8c00 100%);
  color: #3a1f00;
  font-size: 1rem;
  font-weight: 900;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 6px 28px rgba(255,165,0,.38), 0 2px 6px rgba(0,0,0,.4);
  transition: transform .15s, box-shadow .15s;
  position: relative;
  overflow: hidden;
}

.login-submit::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, rgba(255,255,255,.30) 0%, transparent 55%);
}

.login-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(255,165,0,.50), 0 3px 10px rgba(0,0,0,.4);
}

.login-submit:active { transform: translateY(0) scale(.98); }

/* Slide-out transition when login succeeds */
#loginScreen.fade-out {
  animation: loginFadeOut .45s ease-in forwards;
}

@keyframes loginFadeOut {
  0%   { opacity: 1; transform: scale(1);    }
  100% { opacity: 0; transform: scale(1.04); }
}
</style>
</head>
<body>

<!-- ── Login screen ─────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">

    <div class="login-logo">
      <span class="coin-icon">🪙</span>
      <h2>⚜ Coin Flip</h2>
      <p>Sign in to play</p>
    </div>

    <form class="login-fields" id="loginForm" onsubmit="attemptLogin(event)">
      <div class="login-field">
        <label for="usernameInput">Username</label>
        <input
          id="usernameInput"
          type="text"
          placeholder="Enter username"
          autocomplete="username"
          spellcheck="false"
        >
      </div>
      <div class="login-field">
        <label for="passwordInput">Password</label>
        <input
          id="passwordInput"
          type="password"
          placeholder="Enter password"
          autocomplete="current-password"
        >
      </div>
    </form>

    <div class="login-error" id="loginError">Invalid username or password</div>

    <button class="login-submit" onclick="attemptLogin(event)">Enter Game</button>

  </div>
</div>

<!-- ── Game (hidden until login) ────────────────────────── -->
<canvas id="particles"></canvas>

<div class="page">
  <header>
    <h1>⚜ Coin Flip</h1>
    <p>Bet big · flip fast · win everything</p>
  </header>

  <main>
    <!-- Balance bar -->
    <div class="balance-bar">
      <div class="bal-block">
        <div class="bal-label">Balance</div>
        <div class="bal-value" id="balanceVal">100</div>
      </div>
      <div class="bal-block">
        <div class="bal-label">Wins</div>
        <div class="bal-value" id="winsVal">0</div>
      </div>
      <div class="bal-block">
        <div class="bal-label">Losses</div>
        <div class="bal-value" id="lossesVal">0</div>
      </div>
      <div class="bal-block">
        <div class="bal-label">Streak</div>
        <div class="bal-value" id="streakVal">—</div>
      </div>
    </div>

    <!-- Coin -->
    <div class="coin-stage" id="coinStage">
      <div class="coin" id="coin">
        <div class="coin-heads">
          <span class="symbol">👑</span>
        </div>
        <div class="coin-tails">
          <span class="symbol">⭐</span>
          <span class="label">Tails</span>
        </div>
      </div>
    </div>

    <!-- Result -->
    <div class="result-badge">
      <div id="resultMsg"></div>
    </div>

    <!-- Bet panel -->
    <div class="bet-panel">
      <!-- Side selector -->
      <div class="side-row">
        <button class="side-btn active-heads" id="btnHeads" onclick="chooseSide('heads')">
          <span class="icon">🥇</span> Heads
        </button>
        <button class="side-btn" id="btnTails" onclick="chooseSide('tails')">
          <span class="icon">🥈</span> Tails
        </button>
      </div>

      <!-- Bet slider -->
      <div>
        <div class="bet-label-row">
          <span>Your bet</span>
          <span id="betDisplay">10 🪙</span>
        </div>
        <input type="range" id="betSlider" min="1" max="100" value="10" oninput="onSlider()">
      </div>

      <!-- Presets -->
      <div class="presets">
        <button class="preset-btn" onclick="setPreset(0.10)">10%</button>
        <button class="preset-btn" onclick="setPreset(0.25)">25%</button>
        <button class="preset-btn" onclick="setPreset(0.50)">Half</button>
        <button class="preset-btn" onclick="setPreset(1.00)">All‑in</button>
      </div>

      <!-- Flip button -->
      <button class="flip-btn" id="flipBtn" onclick="doFlip()">Flip Coin</button>
    </div>

    <!-- History -->
    <div class="history-section">
      <div class="history-header">Last 20 flips</div>
      <div class="dots" id="dotsRow"></div>
    </div>
  </main>

  <footer>
    <button class="reset-btn" onclick="resetGame()">↺ New Game</button>
  </footer>
</div>

<!-- Bankrupt modal -->
<div id="bankruptModal">
  <div class="modal-box">
    <div class="emoji">💸</div>
    <h2>Bankrupt!</h2>
    <p>You lost it all. Better luck next time, high roller.</p>
    <button onclick="resetGame()">Start Over</button>
  </div>
</div>

<script>
/* ── Login ──────────────────────────────────────────────── */
const VALID_USER = 'abc123';
const VALID_PASS = 'cba321';

function attemptLogin(e) {
  e.preventDefault();

  const userInput  = document.getElementById('usernameInput');
  const passInput  = document.getElementById('passwordInput');
  const errorBanner = document.getElementById('loginError');

  const username = userInput.value.trim();
  const password = passInput.value;

  // Clear previous error state
  userInput.classList.remove('input-error');
  passInput.classList.remove('input-error');
  errorBanner.classList.remove('show');

  if (username === VALID_USER && password === VALID_PASS) {
    // Success — fade out the login screen then remove it
    const screen = document.getElementById('loginScreen');
    screen.classList.add('fade-out');
    screen.addEventListener('animationend', () => screen.remove(), { once: true });
  } else {
    // Failure — highlight both fields and show generic message
    userInput.classList.add('input-error');
    passInput.classList.add('input-error');
    errorBanner.classList.add('show');

    // Shake the card
    const card = document.querySelector('.login-card');
    card.animate([
      { transform: 'translateX(0)'    },
      { transform: 'translateX(-9px)' },
      { transform: 'translateX(8px)'  },
      { transform: 'translateX(-6px)' },
      { transform: 'translateX(5px)'  },
      { transform: 'translateX(0)'    }
    ], { duration: 380, easing: 'ease-out' });

    // Clear error highlight when user starts retyping
    [userInput, passInput].forEach(el => {
      el.addEventListener('input', () => {
        el.classList.remove('input-error');
        errorBanner.classList.remove('show');
      }, { once: true });
    });
  }
}

// Allow Enter key from either field to submit
document.addEventListener('DOMContentLoaded', () => {
  ['usernameInput', 'passwordInput'].forEach(id => {
    document.getElementById(id)
      .addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(e); });
  });
});

/* ── State ─────────────────────────────────────────────── */
let balance = 100;
let bet     = 10;
let side    = 'heads';   // player's chosen side
let wins = 0, losses = 0;
let streak = 0, streakSide = null;
let flipping = false;
let history  = [];       // array of {result, won, side}

/* ── DOM refs ──────────────────────────────────────────── */
const coin       = document.getElementById('coin');
const flipBtn    = document.getElementById('flipBtn');
const resultMsg  = document.getElementById('resultMsg');
const dotsRow    = document.getElementById('dotsRow');
const slider     = document.getElementById('betSlider');
const balVal     = document.getElementById('balanceVal');
const winsVal    = document.getElementById('winsVal');
const lossesVal  = document.getElementById('lossesVal');
const streakVal  = document.getElementById('streakVal');
const betDisplay = document.getElementById('betDisplay');
const modal      = document.getElementById('bankruptModal');
const pCanvas    = document.getElementById('particles');
const pCtx       = pCanvas.getContext('2d');

/* ── Particles ─────────────────────────────────────────── */
pCanvas.width  = window.innerWidth;
pCanvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  pCanvas.width  = window.innerWidth;
  pCanvas.height = window.innerHeight;
});

function burst(won) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * .42;
  const palette = won
    ? ['#FFD700','#ffaa30','#fff8c0','#ff8c00']
    : ['#ef4444','#f87171','#fca5a5','#dc2626'];
  const particles = Array.from({length: 38}, () => {
    const angle = Math.random() * Math.PI * 2;
    const speed = 90 + Math.random() * 140;
    return {
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 80,
      r: 3 + Math.random() * 5,
      color: palette[Math.floor(Math.random() * palette.length)],
      life: 1, decay: .020 + Math.random() * .018,
      gravity: 120
    };
  });
  let last = performance.now();
  function frame(now) {
    const dt = Math.min((now - last) / 1000, .05);
    last = now;
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    let alive = false;
    for (const p of particles) {
      if (p.life <= 0) continue;
      alive = true;
      p.x  += p.vx  * dt;
      p.y  += p.vy  * dt;
      p.vy += p.gravity * dt;
      p.life -= p.decay;
      pCtx.save();
      pCtx.globalAlpha = Math.max(0, p.life);
      pCtx.fillStyle = p.color;
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      pCtx.fill();
      pCtx.restore();
    }
    if (alive) requestAnimationFrame(frame);
    else pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  }
  requestAnimationFrame(frame);
}

/* ── Helpers ───────────────────────────────────────────── */
function clampBet() {
  bet = Math.max(1, Math.min(bet, balance));
  slider.max   = balance;
  slider.value = bet;
  updateSliderBg();
  betDisplay.textContent = bet + ' 🪙';
}

function updateSliderBg() {
  const pct = ((slider.value - slider.min) / (slider.max - slider.min) * 100).toFixed(1);
  slider.style.setProperty('--pct', pct + '%');
}

function onSlider() {
  bet = parseInt(slider.value, 10);
  betDisplay.textContent = bet + ' 🪙';
  updateSliderBg();
}

function setPreset(frac) {
  bet = Math.max(1, Math.round(balance * frac));
  clampBet();
}

function chooseSide(s) {
  side = s;
  document.getElementById('btnHeads').className = 'side-btn' + (s === 'heads' ? ' active-heads' : '');
  document.getElementById('btnTails').className = 'side-btn' + (s === 'tails' ? ' active-tails' : '');
}

function updateStats() {
  balVal.textContent    = balance;
  winsVal.textContent   = wins;
  lossesVal.textContent = losses;
  if (streak === 0) {
    streakVal.textContent = '—';
    streakVal.style.color = '#a78bfa';
  } else {
    streakVal.textContent = streak + (streakSide === 'heads' ? 'H' : 'T');
    streakVal.style.color = streakSide === 'heads' ? 'var(--gold-bright)' : 'var(--silver-bright)';
  }
}

function addDot(result, won) {
  // result: 'heads'|'tails'  won: bool
  history.push({result, won});
  if (history.length > 20) history.shift();
  renderDots();
}

function renderDots() {
  dotsRow.innerHTML = '';
  for (const h of history) {
    const d = document.createElement('div');
    // class: win-h, lose-h, win-t, lose-t
    const letter = h.result === 'heads' ? 'h' : 't';
    d.className = `dot ${h.won ? 'win' : 'lose'}-${letter}`;
    d.textContent = h.result === 'heads' ? 'H' : 'T';
    dotsRow.appendChild(d);
  }
}

/* ── Core flip ─────────────────────────────────────────── */
function doFlip() {
  if (flipping) return;
  if (bet < 1 || bet > balance) return;

  flipping = true;
  flipBtn.disabled = true;
  resultMsg.className = 'result-text'; // hide

  const result = Math.random() < 0.5 ? 'heads' : 'tails';
  const won    = result === side;

  // Strip any stale anim classes, reset inline transform first
  coin.style.transition = 'none';
  coin.style.transform  = 'rotateY(0deg)';
  coin.className = 'coin';

  // Force reflow then launch animation
  void coin.offsetWidth;
  coin.style.transition = '';
  coin.classList.add(result === 'heads' ? 'flip-heads' : 'flip-tails');

  setTimeout(() => {
    // Lock final pose without animation
    coin.style.transition = 'none';
    coin.style.transform  = result === 'heads' ? 'rotateY(0deg)' : 'rotateY(180deg)';
    coin.className = 'coin';

    // Update balance
    if (won) {
      balance += bet;
      wins++;
    } else {
      balance -= bet;
      losses++;
    }

    // Streak
    if (streakSide === result) streak++;
    else { streak = 1; streakSide = result; }

    updateStats();
    addDot(result, won);
    clampBet();
    burst(won);

    // Result message
    const emoji  = result === 'heads' ? '🦅' : '🌙';
    const side_s = result.charAt(0).toUpperCase() + result.slice(1);
    resultMsg.textContent = won
      ? `${emoji} ${side_s} — You won ${bet} 🪙!`
      : `${emoji} ${side_s} — You lost ${bet} 🪙`;
    resultMsg.className = 'show ' + (won ? 'win' : 'lose');

    flipping = false;

    if (balance === 0) {
      setTimeout(() => modal.classList.add('show'), 600);
    } else {
      flipBtn.disabled = false;
    }

  }, 1150);
}

/* ── Reset ─────────────────────────────────────────────── */
function resetGame() {
  balance = 100; bet = 10;
  wins = 0; losses = 0; streak = 0; streakSide = null;
  history = [];
  flipping = false;
  modal.classList.remove('show');
  coin.style.transition = 'none';
  coin.style.transform  = 'rotateY(0deg)';
  coin.className = 'coin';
  resultMsg.className   = '';
  resultMsg.textContent = '';
  chooseSide('heads');
  renderDots();
  slider.max   = 100;
  slider.value = 10;
  updateSliderBg();
  betDisplay.textContent = '10 🪙';
  flipBtn.disabled = false;
  updateStats();
}

/* ── Init ──────────────────────────────────────────────── */
updateSliderBg();
updateStats();
</script>
</body>
</html>
