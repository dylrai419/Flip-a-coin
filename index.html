<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coin Flip</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at top, #1a1a2e 0%, #0d0d1a 60%, #000 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }

    /* Starfield background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 15%, rgba(255,255,255,0.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 14px 28px;
      text-align: center;
      min-width: 100px;
      transition: transform 0.2s, background 0.2s;
    }

    .stat-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-value.heads { color: #f6d365; }
    .stat-value.tails { color: #a78bfa; }
    .stat-value.flips { color: #60d3f0; }

    /* Coin scene */
    .coin-scene {
      perspective: 800px;
      cursor: pointer;
      width: 200px;
      height: 200px;
    }

    .coin-scene:hover .coin:not(.flipping) {
      transform: rotateY(15deg) scale(1.04);
      filter: drop-shadow(0 0 30px rgba(246,211,101,0.5));
    }

    .coin {
      width: 200px;
      height: 200px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.15s ease, filter 0.3s ease;
      filter: drop-shadow(0 10px 40px rgba(246,211,101,0.3));
    }

    .coin.flipping {
      animation: coinFlip 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes coinFlip {
      0%   { transform: rotateY(0deg) translateY(0px); }
      20%  { transform: rotateY(360deg) translateY(-80px); }
      50%  { transform: rotateY(900deg) translateY(-120px); }
      80%  { transform: rotateY(1440deg) translateY(-30px); }
      100% { transform: rotateY(1800deg) translateY(0px); }
    }

    .coin.land-heads { animation: coinFlip 1s cubic-bezier(0.4,0,0.2,1) forwards; }
    .coin.land-tails { animation: coinFlipTails 1s cubic-bezier(0.4,0,0.2,1) forwards; }

    @keyframes coinFlipTails {
      0%   { transform: rotateY(0deg) translateY(0px); }
      20%  { transform: rotateY(360deg) translateY(-80px); }
      50%  { transform: rotateY(900deg) translateY(-120px); }
      80%  { transform: rotateY(1440deg) translateY(-30px); }
      100% { transform: rotateY(1980deg) translateY(0px); }
    }

    .coin-face {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Heads face */
    .coin-heads {
      background: conic-gradient(
        from 0deg,
        #c8960c 0deg, #f6d365 30deg, #fda085 60deg,
        #f6d365 90deg, #e8a820 120deg, #f6d365 150deg,
        #c8960c 180deg, #f6d365 210deg, #fda085 240deg,
        #f6d365 270deg, #e8a820 300deg, #f6d365 330deg,
        #c8960c 360deg
      );
      border: 6px solid #b8830a;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.3), inset 0 2px 6px rgba(255,255,255,0.4);
    }

    .coin-heads::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.25) 0%, transparent 60%);
    }

    .coin-heads-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .coin-heads-portrait {
      font-size: 4rem;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    .coin-heads-text {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: #7a4f00;
      text-transform: uppercase;
    }

    /* Tails face */
    .coin-tails {
      background: conic-gradient(
        from 0deg,
        #5b21b6 0deg, #7c3aed 30deg, #a78bfa 60deg,
        #7c3aed 90deg, #6d28d9 120deg, #a78bfa 150deg,
        #5b21b6 180deg, #7c3aed 210deg, #a78bfa 240deg,
        #7c3aed 270deg, #6d28d9 300deg, #a78bfa 330deg,
        #5b21b6 360deg
      );
      border: 6px solid #4c1d95;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.3), inset 0 2px 6px rgba(255,255,255,0.3);
      transform: rotateY(180deg);
    }

    .coin-tails::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.2) 0%, transparent 60%);
    }

    .coin-tails-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .coin-tails-symbol {
      font-size: 3.5rem;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    .coin-tails-text {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: #c4b5fd;
      text-transform: uppercase;
    }

    /* Coin edge (middle ring illusion) */
    .coin-edge {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: transparent;
      transform: rotateY(90deg);
      pointer-events: none;
    }

    /* Result display */
    .result {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-text {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translateY(10px) scale(0.9);
      transition: opacity 0.4s, transform 0.4s;
    }

    .result-text.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .result-text.heads-result { color: #f6d365; text-shadow: 0 0 20px rgba(246,211,101,0.6); }
    .result-text.tails-result { color: #a78bfa; text-shadow: 0 0 20px rgba(167,139,250,0.6); }

    /* Flip button */
    .flip-btn {
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      border: none;
      border-radius: 50px;
      padding: 16px 56px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a0a00;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(246,211,101,0.35), 0 2px 8px rgba(0,0,0,0.3);
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      position: relative;
      overflow: hidden;
    }

    .flip-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 60%);
      border-radius: inherit;
    }

    .flip-btn:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 40px rgba(246,211,101,0.5), 0 4px 12px rgba(0,0,0,0.3);
    }

    .flip-btn:active:not(:disabled) { transform: translateY(0) scale(0.98); }

    .flip-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* History row */
    .history {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 360px;
      min-height: 32px;
    }

    .history-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      animation: dotPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    .history-dot.h {
      background: rgba(246,211,101,0.2);
      border: 1.5px solid #f6d365;
      color: #f6d365;
    }

    .history-dot.t {
      background: rgba(167,139,250,0.2);
      border: 1.5px solid #a78bfa;
      color: #a78bfa;
    }

    @keyframes dotPop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Reset button */
    .reset-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 8px 24px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .reset-btn:hover {
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.06);
    }

    /* Particle burst */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: particleFly 0.9s ease-out forwards;
    }

    @keyframes particleFly {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Coin Flip</h1>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Flips</div>
      <div class="stat-value flips" id="statFlips">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Heads</div>
      <div class="stat-value heads" id="statHeads">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tails</div>
      <div class="stat-value tails" id="statTails">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="statStreak" style="color:#60d3f0">—</div>
    </div>
  </div>

  <div class="coin-scene" id="coinScene" onclick="flip()">
    <div class="coin" id="coin">
      <div class="coin-face coin-heads">
        <div class="coin-heads-inner">
          <span class="coin-heads-portrait">🦅</span>
          <span class="coin-heads-text">Heads</span>
        </div>
      </div>
      <div class="coin-face coin-tails">
        <div class="coin-tails-inner">
          <span class="coin-tails-symbol">🌟</span>
          <span class="coin-tails-text">Tails</span>
        </div>
      </div>
    </div>
  </div>

  <div class="result">
    <div class="result-text" id="resultText"></div>
  </div>

  <button class="flip-btn" id="flipBtn" onclick="flip()">Flip Coin</button>

  <div class="history" id="history"></div>

  <button class="reset-btn" onclick="reset()">Reset Stats</button>
</div>

<canvas class="particles" id="particles"></canvas>

<script>
  let flips = 0, heads = 0, tails = 0;
  let streak = 0, streakSide = null;
  let isFlipping = false;
  let currentSide = 'heads'; // track which side is showing

  const coin = document.getElementById('coin');
  const flipBtn = document.getElementById('flipBtn');
  const resultText = document.getElementById('resultText');
  const history = document.getElementById('history');
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  function updateStats() {
    document.getElementById('statFlips').textContent = flips;
    document.getElementById('statHeads').textContent = heads;
    document.getElementById('statTails').textContent = tails;
    const streakEl = document.getElementById('statStreak');
    if (streak === 0) {
      streakEl.textContent = '—';
      streakEl.style.color = '#60d3f0';
    } else {
      streakEl.textContent = `${streak}${streakSide === 'heads' ? 'H' : 'T'}`;
      streakEl.style.color = streakSide === 'heads' ? '#f6d365' : '#a78bfa';
    }
  }

  function addHistoryDot(side) {
    const dot = document.createElement('div');
    dot.className = `history-dot ${side === 'heads' ? 'h' : 't'}`;
    dot.textContent = side === 'heads' ? 'H' : 'T';
    history.appendChild(dot);
    // Keep max 20
    while (history.children.length > 20) history.removeChild(history.firstChild);
  }

  function spawnParticles(side) {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const color = side === 'heads' ? ['#f6d365','#fda085','#fff8e1'] : ['#a78bfa','#7c3aed','#e9d5ff'];
    const count = 28;

    const particles = [];
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
      const dist = 80 + Math.random() * 120;
      particles.push({
        x: cx, y: cy,
        dx: Math.cos(angle) * dist,
        dy: Math.sin(angle) * dist - 60,
        r: 3 + Math.random() * 5,
        color: color[Math.floor(Math.random() * color.length)],
        life: 1, decay: 0.025 + Math.random() * 0.02
      });
    }

    function draw() {
      let alive = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of particles) {
        if (p.life <= 0) continue;
        alive = true;
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x + p.dx * (1 - p.life), p.y + p.dy * (1 - p.life), p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        p.life -= p.decay;
      }
      if (alive) requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    draw();
  }

  function flip() {
    if (isFlipping) return;
    isFlipping = true;
    flipBtn.disabled = true;

    // Hide result
    resultText.classList.remove('show');

    const result = Math.random() < 0.5 ? 'heads' : 'tails';

    // Remove old animation classes
    coin.classList.remove('land-heads', 'land-tails', 'flipping');

    // Force reflow
    void coin.offsetWidth;

    // The animation ends at either 1800deg (shows heads) or 1980deg (shows tails)
    coin.classList.add(result === 'heads' ? 'land-heads' : 'land-tails');

    setTimeout(() => {
      // Update state
      flips++;
      if (result === 'heads') heads++;
      else tails++;

      if (streakSide === result) streak++;
      else { streak = 1; streakSide = result; }

      currentSide = result;
      updateStats();
      addHistoryDot(result);

      // Show result
      resultText.textContent = result === 'heads' ? '🦅 Heads!' : '🌟 Tails!';
      resultText.className = `result-text show ${result}-result`;

      spawnParticles(result);

      coin.classList.remove('land-heads', 'land-tails');
      // Lock coin in final state via transform
      coin.style.transform = result === 'heads' ? 'rotateY(0deg)' : 'rotateY(180deg)';

      isFlipping = false;
      flipBtn.disabled = false;
    }, 1000);
  }

  function reset() {
    if (isFlipping) return;
    flips = 0; heads = 0; tails = 0; streak = 0; streakSide = null;
    updateStats();
    history.innerHTML = '';
    resultText.classList.remove('show');
    coin.style.transform = 'rotateY(0deg)';
    currentSide = 'heads';
  }

  updateStats();
</script>
</body>
</html>
